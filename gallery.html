<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Why they fumbled — per-puzzle clicks</title>
<link rel="icon" href="favicon.svg">
<style>
  :root { --bg:#0c0e12; --panel:#14171d; --line:#232833; --txt:#e8edf4; --mut:#8b95a7; --good:#4dd4ac; --accent:#6aa8ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; }
  .wrap { max-width:1100px; margin:0 auto; padding:26px 18px 60px; }
  h1 { font-size:23px; margin:0 0 4px; }
  .sub { color:var(--mut); margin:0 0 8px; }
  a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
  .key { color:var(--mut); font-size:13px; margin:0 0 22px; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; vertical-align:middle; margin:0 3px 0 10px; }
  .puzzle { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; margin:0 0 20px; }
  .phead { display:flex; align-items:center; gap:14px; margin:0 0 14px; flex-wrap:wrap; }
  .phead .legimg { height:34px; background:#0c0e12; border:1px solid var(--line); border-radius:6px; padding:2px 6px; }
  .phead .names { font-weight:600; }
  .phead .mut { color:var(--mut); font-weight:400; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
  .cell { background:#0c0e12; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .cell img { width:100%; display:block; }
  .cell .cap { padding:7px 9px; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .cell .cap .mut { color:var(--mut); font-weight:400; font-size:12px; }
  footer { color:var(--mut); margin-top:10px; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Why they fumbled</h1>
  <p class="sub">Each model's actual clicks on the same real Smyths puzzles. <a href="./">← leaderboard</a></p>
  <p class="key">
    <span class="dot" style="background:#00ff00"></span> green = correct doodle centre
    <span class="dot" style="background:#ff3030"></span> red = where the model clicked.
    A model "solves" only if every green has a red on it.
  </p>
  <div id="board"></div>
  <footer>Generated by <code>bin/bench-solve.js</code>. Grows as more puzzles are captured + labelled.</footer>
</div>
<script>
async function load() {
  let m; try { m = await fetch('data/overlays.json?_='+Date.now()).then(r=>r.json()); } catch { return; }
  const board = document.getElementById('board');
  const ov = (id,cfg)=>`data/overlays/${id}__${cfg}.png`;
  board.innerHTML = (m.puzzles||[]).map(p=>`
    <div class="puzzle">
      <div class="phead">
        <img class="legimg" src="${ov(p.id,'legend')}" alt="legend" onerror="this.style.display='none'">
        <span class="names">${(p.legend||[]).join(' → ')}</span>
        <span class="mut">(${(p.legend||[]).length} to click, in order)</span>
      </div>
      <div class="grid">
        ${(m.configs||[]).map(c=>`
          <div class="cell">
            <img src="${ov(p.id,c)}" alt="${c}" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="cap"><span>${c}</span></div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}
load();
</script>
</body>
</html>
